<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NNA VITTALO — Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; color: #1a1f36; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #2952c8; color: white; padding: 25px; text-align: center; }
        .header h1 { margin: 0; font-family: 'Montserrat'; font-size: 1.5rem; }
        
        .controls { padding: 20px; background: #eef2ff; display: flex; flex-direction: column; gap: 15px; border-bottom: 1px solid #d0d7de; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 1rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .stat-card { background: #fff; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card small { color: #64748b; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }
        .stat-val { font-size: 1.25rem; font-weight: 800; color: #2952c8; margin-top: 5px; }

        .booking-item { border-bottom: 1px solid #f1f5f9; }
        .booking-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .booking-header:hover { background: #f8fafc; }
        .booking-details { display: none; padding: 15px; background: #f8fafc; border-top: 1px dashed #e2e8f0; font-size: 0.9rem; line-height: 1.6; }
        
        .login-overlay { position: fixed; inset: 0; background: #2952c8; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: white; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #2952c8; color: white; border: none; padding: 12px 20px; border-radius: 5px; width: 100%; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2 style="font-family:Montserrat">Admin Login</h2>
        <input type="email" id="adminEmail" placeholder="Admin Email">
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="handleLogin()">Log In</button>
    </div>
</div>

<div class="admin-container">
    <div class="header">
        <h1>Admin Dashboard</h1>
        <p id="userEmail" style="font-size: 0.8rem; opacity: 0.8;"></p>
    </div>

    <div class="controls">
        <label style="font-weight:700">Filter by Event ID:</label>
        <select id="eventFilter" onchange="renderDisplay()">
            <option value="all">All Bookings</option>
        </select>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><small>Count</small><div id="statCount" class="stat-val">0</div></div>
        <div class="stat-card"><small>Total PLN</small><div id="statPLN" class="stat-val">0</div></div>
        <div class="stat-card"><small>Total EUR</small><div id="statEUR" class="stat-val">€0</div></div>
    </div>

    <div id="bookingList">
        </div>
</div>

<script>
    // 1. CONFIGURATION
    const ADMIN_EMAILS = ["nipyup96@gmail.com", "nishinp1@gmail.com", "nishinpulpadan@gmail.com"];
    const supabaseUrl = 'https://ghwmmkiynmnunotwnenj.supabase.co'; 
    const supabaseKey = 'sb_publishable_Acw5np0AS4ROmGQIllYCpQ_m5NHqk6_';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let allData = [];

    // 2. AUTHENTICATION
    async function handleLogin() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPass').value;

        if(!ADMIN_EMAILS.includes(email)) {
            alert("This email is not authorized as an admin.");
            return;
        }

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if(error) alert(error.message);
        else initDashboard();
    }

    async function initDashboard() {
        document.getElementById('loginOverlay').style.display = 'none';
        const { data: { user } } = await _supabase.auth.getUser();
        document.getElementById('userEmail').innerText = `Logged in as: ${user.email}`;

        // Fetch Data
        const { data, error } = await _supabase.from('bookings').select('*').order('created_at', { ascending: false });
        if(error) { console.error(error); return; }

        allData = data;

        // Fill Filter Dropdown
        const filter = document.getElementById('eventFilter');
        const uniqueEvents = [...new Set(data.map(b => b.event_id))].filter(Boolean);
        uniqueEvents.forEach(id => {
            const opt = document.createElement('option');
            opt.value = id; opt.innerText = id;
            filter.appendChild(opt);
        });

        renderDisplay();
    }

    // 3. DISPLAY LOGIC
    function renderDisplay() {
        const selectedId = document.getElementById('eventFilter').value;
        const filtered = (selectedId === 'all') ? allData : allData.filter(b => b.event_id === selectedId);

        // Sums
        const totalPLN = filtered.reduce((s, b) => s + (Number(b.total_price_pln) || 0), 0);
        const totalEUR = filtered.reduce((s, b) => s + (Number(b.total_price_eur) || 0), 0);

        document.getElementById('statCount').innerText = filtered.length;
        document.getElementById('statPLN').innerText = totalPLN.toLocaleString() + " PLN";
        document.getElementById('statEUR').innerText = "€" + totalEUR.toLocaleString();

        const list = document.getElementById('bookingList');
        list.innerHTML = filtered.map(b => `
            <div class="booking-item">
                <div class="booking-header" onclick="toggleDetails(this)">
                    <div>
                        <strong>${b.event_id || 'Unknown Trip'}</strong><br>
                        <small style="color:#64748b">${new Date(b.created_at).toLocaleDateString()}</small>
                    </div>
                    <div style="text-align:right">
                        <span style="color:#2952c8; font-weight:800">${b.total_price_pln} PLN</span>
                        <span style="font-size:0.7rem; display:block; color:#94a3b8">▼ Details</span>
                    </div>
                </div>
                <div class="booking-details">
                    <strong>👤 Customer:</strong> ${b.customer_name}<br>
                    <strong>📞 Phone:</strong> ${b.phone_number}<br>
                    <strong>👥 Guests:</strong> ${b.guests}<br>
                    <strong>💶 Total EUR:</strong> €${b.total_price_eur}<br>
                    <strong>📅 Created:</strong> ${new Date(b.created_at).toLocaleString()}
                </div>
            </div>
        `).join('');
    }

    function toggleDetails(el) {
        const details = el.nextElementSibling;
        details.style.display = (details.style.display === 'block') ? 'none' : 'block';
    }

    // Check if session exists on load
    _supabase.auth.getSession().then(({data}) => {
        if(data.session && ADMIN_EMAILS.includes(data.session.user.email)) initDashboard();
    });
</script>
</body>
</html>
