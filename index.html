<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — NNA VITTALO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <script>
        // 1. CONFIGURATION
        const ADMIN_ACCOUNTS = {
            "nipyup96@gmail.com": "pass1",
            "nishinp1@gmail.com": "pass2",
            "nishinpulpadan@gmail.com": "pass3"
        };

        const supabaseUrl = 'https://ghwmmkiynmnunotwnenj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdod21ta2l5bm1udW5vdHduZW5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzkxMjEsImV4cCI6MjA5MDU1NTEyMX0.gC5tdWEciwZbF_1FzmD16V7JX66N7nHJ-G00C4gyG_0'; 
        const _db = supabase.createClient(supabaseUrl, supabaseKey);

        let bookingsCache = [];

        // 2. LOGIN FUNCTION
        function attemptLogin() {
            const e = document.getElementById('emailIn').value.toLowerCase().trim();
            const p = document.getElementById('passIn').value;
            const errorDisplay = document.getElementById('loginError');

            if (ADMIN_ACCOUNTS[e] && ADMIN_ACCOUNTS[e] === p) {
                sessionStorage.setItem('admin_auth', 'true');
                if(errorDisplay) errorDisplay.style.display = 'none';
                initDashboard();
            } else { 
                if(errorDisplay) {
                    errorDisplay.style.display = 'block';
                    errorDisplay.innerText = "Invalid email or password.";
                } else {
                    alert("Invalid email or password.");
                }
            }
        }

        // 3. DASHBOARD INIT
        async function initDashboard() {
            const overlay = document.getElementById('loginOverlay');
            const dash = document.getElementById('dashboard');
            if(overlay) overlay.style.display = 'none';
            if(dash) dash.style.display = 'block';

            const { data, error } = await _db.from('bookings').select('*').order('created_at', { ascending: false });
            if (error) { 
                console.error(error); 
                return; 
            }

            bookingsCache = data;

            const filter = document.getElementById('eventFilter');
            if(filter) {
                filter.innerHTML = '<option value="all">All Bookings</option>';
                const ids = [...new Set(data.map(b => b.event_id))].filter(Boolean);
                ids.forEach(id => {
                    filter.innerHTML += `<option value="${id}">${id}</option>`;
                });
            }

            renderDisplay();
        }

        function renderDisplay() {
            const filterEl = document.getElementById('eventFilter');
            const val = filterEl ? filterEl.value : 'all';
            const filtered = (val === 'all') ? bookingsCache : bookingsCache.filter(b => b.event_id === val);

            const sumPLN = filtered.reduce((acc, b) => acc + (Number(b.total_price_pln) || 0), 0);
            const sumEUR = filtered.reduce((acc, b) => acc + (Number(b.total_price_eur) || 0), 0);

            document.getElementById('countDiv').innerText = filtered.length;
            document.getElementById('plnDiv').innerText = sumPLN.toLocaleString() + " PLN";
            document.getElementById('eurDiv').innerText = "€" + sumEUR.toLocaleString();

            const container = document.getElementById('listContainer');
            container.innerHTML = filtered.map(b => `
                <div class="booking-row" style="border-bottom: 1px solid #eee; padding: 10px;">
                    <div class="booking-summary" style="display:flex; justify-content:space-between; cursor:pointer;" onclick="toggleDetails(this)">
                        <div>
                            <strong style="color:#2952c8">${b.event_id}</strong><br>
                            <small>${b.customer_name}</small>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:800">${b.total_price_pln} PLN</div>
                            <small style="color:#94a3b8">Details ▼</small>
                        </div>
                    </div>
                    <div class="booking-details" style="display:none; padding:10px; background:#f9f9f9; margin-top:10px;">
                        <p><strong>👤 Name:</strong> ${b.customer_name}</p>
                        <p><strong>📞 Phone:</strong> ${b.phone_number}</p>
                        <p><strong>👥 Guests:</strong> ${b.guests}</p>
                        <p><strong>💶 Amount:</strong> €${b.total_price_eur}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleDetails(el) {
            const details = el.nextElementSibling;
            details.style.display = (details.style.display === 'block') ? 'none' : 'block';
        }

        window.onload = () => {
            if (sessionStorage.getItem('admin_auth') === 'true') initDashboard();
        };
    </script>

    <style>
        :root { --primary: #2952c8; --bg: #f0f4f8; --text: #1a1f36; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .admin-wrapper { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; display: none; }
        .header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .top-panel { padding: 20px; background: #f8faff; border-bottom: 1px solid #e2e8f0; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 1rem; margin-top: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        
        .login-overlay {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(41, 82, 200, 0.5), rgba(41, 82, 200, 0.5)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; z-index: 10001;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 24px; padding: 40px; width: 90%; max-width: 380px; text-align: center;
        }
        
        .login-input { width: 100%; padding: 15px; margin-bottom: 20px; border: none; border-radius: 12px; background: white; font-size: 1rem; }
        .btn-login { background: rgba(255, 255, 255, 0.15); border: 2px solid white; color: white; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-login:hover { background: white; color: var(--primary); }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <img src="https://image2url.com/r2/default/images/1775205068668-9ce153cf-7aa5-4e66-8e5e-013745d94b55.jpg" alt="Logo" style="height: 60px; margin-bottom: 20px;">
        <h1 style="font-family: Montserrat; color: white; margin-bottom: 20px; font-size: 1.5rem; font-weight: 800; text-transform: uppercase;">Admin Dashboard</h1>
        
        <input type="email" id="emailIn" class="login-input" placeholder="Email">
        <input type="password" id="passIn" class="login-input" placeholder="Password">
        
        <p id="loginError" style="display: none; color: #ffcccc; font-weight: 600; margin-bottom: 10px;">Invalid email or password.</p>
        
        <button class="btn-login" onclick="attemptLogin()">SIGN IN</button>
    </div>
</div>

<div id="dashboard" class="admin-wrapper">
    <div class="header">
        <h1 style="font-family: Montserrat; font-size: 1.2rem;">Dashboard</h1>
        <button onclick="sessionStorage.clear(); window.location.reload();" style="cursor:pointer;">Logout</button>
    </div>

    <div class="top-panel">
        <label style="font-weight:700; font-size:0.8rem;">FILTER BY EVENT ID</label>
        <select id="eventFilter" onchange="renderDisplay()">
            <option value="all">All Bookings</option>
        </select>
        <div class="stats-grid">
            <div class="stat-card"><small>Count</small><div id="countDiv" class="stat-val">0</div></div>
            <div class="stat-card"><small>Total PLN</small><div id="plnDiv" class="stat-val">0</div></div>
            <div class="stat-card"><small>Total EUR</small><div id="eurDiv" class="stat-val">€0</div></div>
        </div>
    </div>

    <div id="listContainer"></div>
</div>

</body>
</html>
