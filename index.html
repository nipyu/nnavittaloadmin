<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — NNA VITTALO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2952c8; --bg: #f0f4f8; --text: #1a1f36; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); }
        
        /* Login Overlay */
        .login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-login { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* Dashboard Layout */
        .admin-wrapper { max-width: 1000px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; display: none; }
        .header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-family: 'Montserrat'; font-size: 1.2rem; }
        .logout-btn { background: rgba(255,255,255,0.15); border: 1px solid white; color: white; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .logout-btn:hover { background: white; color: var(--primary); }

        /* Stats & Controls */
        .top-panel { padding: 20px; background: #f8faff; border-bottom: 1px solid #e2e8f0; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; background: white; font-size: 1rem; margin-top: 5px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .stat-card { background: white; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card small { color: #64748b; font-weight: 700; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-val { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-top: 5px; }

        /* Booking List */
        .booking-row { border-bottom: 1px solid #f1f5f9; }
        .booking-summary { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .booking-summary:hover { background: #f8fafc; }
        .booking-details { display: none; padding: 20px; background: #fcfdfe; border-top: 1px dashed #e2e8f0; font-size: 0.9rem; line-height: 1.8; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .badge { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2 style="font-family: Montserrat; margin-bottom: 5px;">Admin Portal</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">NNA VITTALO Management</p>
        <input type="email" id="emailIn" placeholder="Admin Email">
        <input type="password" id="passIn" placeholder="Password">
        <button class="btn-login" onclick="attemptLogin()">Access Dashboard</button>
        <p id="errorTxt" style="color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none;">Invalid credentials.</p>
    </div>
</div>

<div id="dashboard" class="admin-wrapper">
    <div class="header">
        <h1>Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="top-panel">
        <label style="font-weight: 700; font-size: 0.8rem; color: #475569;">FILTER BY TRIP ID</label>
        <select id="eventFilter" onchange="applyFilter()">
            <option value="all">All Bookings</option>
        </select>

        <div class="stats-grid">
            <div class="stat-card"><small>Total Bookings</small><div id="countDiv" class="stat-val">0</div></div>
            <div class="stat-card"><small>Revenue (PLN)</small><div id="plnDiv" class="stat-val">0</div></div>
            <div class="stat-card"><small>Revenue (EUR)</small><div id="eurDiv" class="stat-val">€0</div></div>
        </div>
    </div>

    <div id="listContainer">
        </div>
</div>

<script>
    // --- 1. SETTINGS ---
    const ADMIN_ACCOUNTS = {
        "nipyup96@gmail.com": "pass123",        // Change these passwords!
        "nishinp1@gmail.com": "pass456",
        "nishinpulpadan@gmail.com": "pass789"
    };

    const supabaseUrl = 'https://ghwmmkiynmnunotwnenj.supabase.co';
    const supabaseKey = 'sb_publishable_Acw5np0AS4ROmGQIllYCpQ_m5NHqk6_';
    const _db = supabase.createClient(supabaseUrl, supabaseKey);

    let bookingsCache = [];

    // --- 2. AUTH LOGIC ---
    function attemptLogin() {
        const email = document.getElementById('emailIn').value.toLowerCase().trim();
        const pass = document.getElementById('passIn').value;
        const err = document.getElementById('errorTxt');

        if (ADMIN_ACCOUNTS[email] && ADMIN_ACCOUNTS[email] === pass) {
            sessionStorage.setItem('admin_session', 'active');
            startApp();
        } else {
            err.style.display = 'block';
        }
    }

    function logout() {
        sessionStorage.removeItem('admin_session');
        window.location.reload();
    }

    // --- 3. DATA LOGIC ---
    async function startApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        const { data, error } = await _db.from('bookings').select('*').order('created_at', { ascending: false });
        
        if (error) {
            alert("Fetch error: " + error.message);
            return;
        }

        bookingsCache = data;

        // Populate filter dropdown
        const filter = document.getElementById('eventFilter');
        const ids = [...new Set(data.map(item => item.event_id))].filter(Boolean);
        ids.forEach(id => {
            filter.innerHTML += `<option value="${id}">${id}</option>`;
        });

        applyFilter();
    }

    function applyFilter() {
        const val = document.getElementById('eventFilter').value;
        const filtered = (val === 'all') ? bookingsCache : bookingsCache.filter(b => b.event_id === val);

        // Update Stats
        const sumPLN = filtered.reduce((acc, curr) => acc + (Number(curr.total_price_pln) || 0), 0);
        const sumEUR = filtered.reduce((acc, curr) => acc + (Number(curr.total_price_eur) || 0), 0);

        document.getElementById('countDiv').innerText = filtered.length;
        document.getElementById('plnDiv').innerText = sumPLN.toLocaleString() + " PLN";
        document.getElementById('eurDiv').innerText = "€" + sumEUR.toLocaleString();

        // Render List
        const container = document.getElementById('listContainer');
        if (filtered.length === 0) {
            container.innerHTML = `<p style="padding:40px; text-align:center; color:#94a3b8;">No records found.</p>`;
            return;
        }

        container.innerHTML = filtered.map(b => `
            <div class="booking-row">
                <div class="booking-summary" onclick="toggleRow(this)">
                    <div>
                        <span class="badge">${b.event_id}</span>
                        <div style="margin-top:5px; font-weight:600;">${b.customer_name}</div>
                        <small style="color:#94a3b8;">${new Date(b.created_at).toLocaleDateString()}</small>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:800; color:#2952c8;">${b.total_price_pln} PLN</div>
                        <small style="color:#94a3b8;">Click to expand ▼</small>
                    </div>
                </div>
                <div class="booking-details">
                    <div class="detail-grid">
                        <div><strong>👤 Name:</strong> ${b.customer_name}</div>
                        <div><strong>📞 Phone:</strong> ${b.phone_number}</div>
                        <div><strong>👥 Guests:</strong> ${b.guests}</div>
                        <div><strong>💶 Price EUR:</strong> €${b.total_price_eur}</div>
                    </div>
                    <div style="margin-top:10px; font-size:0.75rem; color:#cbd5e0;">System ID: ${b.id}</div>
                </div>
            </div>
        `).join('');
    }

    function toggleRow(el) {
        const detail = el.nextElementSibling;
        const isHidden = detail.style.display === 'none' || detail.style.display === '';
        detail.style.display = isHidden ? 'block' : 'none';
        el.querySelector('small:last-child').innerText = isHidden ? 'Close details ▲' : 'Click to expand ▼';
    }

    // Auto-login if session exists
    if (sessionStorage.getItem('admin_session') === 'active') {
        startApp();
    }
</script>

</body>
</html>
